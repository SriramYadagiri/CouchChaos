<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Couch Chaos</title>

<style>
body {
  font-family: sans-serif;
  text-align: center;
  padding: 20px;
}

input, button {
  font-size: 18px;
  padding: 10px;
  margin: 10px;
  width: 80%;
}

#game {
  display: none;
}
</style>

</head>

<body>

<h1>Couch Chaos</h1>

<div id="join">
  <input id="name" placeholder="Your Name">
  <input id="room" placeholder="Room Code">
  <button onclick="joinRoom()">Join Game</button>
</div>

<div id="game">

  <div id="answerSection">
    <h2>Submit Answer</h2>
    <input id="answerInput" placeholder="Your answer">
    <button onclick="submitAnswer()">Submit</button>
  </div>

  <div id="voteSection" style="display:none;">
    <h2>Vote</h2>
    <div id="answers"></div>
  </div>

</div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

<script>

const socket = io("http://localhost:3000")

let roomCode = ""
let playerId = ""

function joinRoom(){

  const name = document.getElementById("name").value
  roomCode = document.getElementById("room").value.toUpperCase()

  socket.emit("join_room", {
    code: roomCode,
    name: name
  })

  document.getElementById("join").style.display = "none"
  document.getElementById("game").style.display = "block"

}

function submitAnswer(){

  const answer = document.getElementById("answerInput").value

  socket.emit("submit_answer", {
    code: roomCode,
    answer: answer
  })

  document.getElementById("answerInput").value = ""

}

function vote(playerId){

  socket.emit("submit_vote", {
    code: roomCode,
    vote: playerId
  })

}

socket.on("answers_update", (answers)=>{

  const voteDiv = document.getElementById("answers")
  voteDiv.innerHTML = ""

  for (const id in answers){

    const btn = document.createElement("button")
    btn.innerText = answers[id]

    btn.onclick = () => vote(id)

    voteDiv.appendChild(btn)
    voteDiv.appendChild(document.createElement("br"))

  }

  document.getElementById("answerSection").style.display = "none"
  document.getElementById("voteSection").style.display = "block"

})

</script>

</body>
</html>
