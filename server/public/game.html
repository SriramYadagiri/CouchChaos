<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Couch Chaos | Controller</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    /* ── Kahoot-style answer grid ── */
    .kahoot-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 12px;
      padding: 12px;
      height: 100%;
      box-sizing: border-box;
    }

    .kahoot-btn {
      position: relative;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px 12px;
      font: inherit;
      font-size: 15px;
      font-weight: 800;
      color: #fff;
      transition: transform 120ms ease, opacity 120ms ease, box-shadow 120ms ease;
      box-shadow: 0 6px 18px rgba(0,0,0,0.3);
      overflow: hidden;
      min-height: 90px;
    }

    .kahoot-btn:active {
      transform: scale(0.96);
    }

    .kahoot-btn:disabled {
      cursor: default;
    }

    /* Color variants */
    .kahoot-btn.red    { background: #c0392b; }
    .kahoot-btn.blue   { background: #2980b9; }
    .kahoot-btn.yellow { background: #d4ac0d; color: #111; }
    .kahoot-btn.green  { background: #239b56; }

    /* Already answered state */
    .kahoot-btn.is-my-answer {
      box-shadow: 0 0 0 4px #fff, 0 6px 24px rgba(0,0,0,0.4);
      transform: scale(1.03);
    }

    /* Reveal: correct answer glows, wrong dims */
    .kahoot-btn.is-correct {
      box-shadow: 0 0 0 4px #fff, 0 0 28px 6px rgba(255,255,255,0.45);
      transform: scale(1.04);
    }

    .kahoot-btn.is-wrong {
      opacity: 0.32;
      transform: scale(0.96);
    }

    /* Full-screen question view layout */
    .trivia-shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      overflow: hidden;
    }

    .trivia-question-bar {
      flex: 0 0 auto;
      padding: 14px 20px 10px;
      background: var(--panel);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .trivia-question-kicker {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8fdfff;
      margin: 0 0 4px;
    }

    .trivia-question-text {
      font-size: clamp(16px, 4.5vw, 22px);
      font-weight: 700;
      line-height: 1.35;
      margin: 0 0 8px;
      color: var(--text);
    }

    .trivia-meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .trivia-timer-track {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.12);
      border-radius: 999px;
      overflow: hidden;
      min-width: 60px;
    }

    .trivia-timer-fill {
      height: 100%;
      border-radius: 999px;
      background: #27c2ff;
      transition: background 300ms ease;
    }

    .trivia-status-chip {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      white-space: nowrap;
    }

    .trivia-answers-area {
      flex: 1 1 auto;
      overflow: hidden;
      padding: 8px;
    }

    /* Result overlay on top of answer grid */
    .trivia-result-banner {
      padding: 14px 20px;
      border-radius: 18px;
      margin: 8px;
      text-align: center;
      animation: slide-up 250ms cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .trivia-result-banner.correct {
      background: rgba(39, 175, 99, 0.25);
      border: 2px solid rgba(39, 175, 99, 0.6);
    }

    .trivia-result-banner.wrong {
      background: rgba(231, 76, 60, 0.2);
      border: 2px solid rgba(231, 76, 60, 0.5);
    }

    .trivia-result-banner.timed-out {
      background: rgba(180, 120, 0, 0.2);
      border: 2px solid rgba(180, 120, 0, 0.5);
    }

    .trivia-result-emoji {
      font-size: 32px;
      margin-bottom: 4px;
    }

    .trivia-result-title {
      font-size: 20px;
      font-weight: 800;
      margin: 0 0 4px;
    }

    .trivia-result-sub {
      font-size: 14px;
      color: var(--muted);
      margin: 0;
    }

    @keyframes slide-up {
      from { transform: translateY(20px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Score waiting message */
    .waiting-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(39,194,255,0.12);
      border: 1px solid rgba(39,194,255,0.25);
      font-size: 13px;
      font-weight: 700;
      color: #92e3ff;
      margin-top: 8px;
    }

    .difficulty-badge {
      display: inline-block;
      margin-bottom: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .difficulty-badge[data-difficulty="1"] { background: rgba(39,194,100,0.18); color: #4ddb8a; }
    .difficulty-badge[data-difficulty="2"] { background: rgba(212,172,13,0.18);  color: #f0c830; }
    .difficulty-badge[data-difficulty="3"] { background: rgba(255,108,129,0.18); color: #ff6c81; }

    .word-sandwich-card {
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    .word-sandwich-topline {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    .word-sandwich-round-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(39,194,255,0.12);
      color: #92e3ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .word-sandwich-letters {
      margin: 0;
      font-size: clamp(48px, 16vw, 84px);
      line-height: 0.9;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #ffffff;
      text-align: center;
      text-shadow: 0 10px 30px rgba(39, 194, 255, 0.22);
    }

    .word-sandwich-subcopy {
      margin: 0;
      color: var(--muted);
      text-align: center;
      line-height: 1.45;
    }

    .word-sandwich-timers {
      display: grid;
      gap: 10px;
    }

    .word-sandwich-timer-row {
      display: grid;
      gap: 6px;
    }

    .word-sandwich-timer-meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 12px;
      font-weight: 700;
      color: #9fc9e3;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .word-sandwich-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .word-sandwich-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2ad1ff, #238dff);
      transition: width 120ms linear, background 160ms ease;
    }

    .word-sandwich-stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .word-sandwich-stat {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    .word-sandwich-stat-value {
      display: block;
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
    }

    .word-sandwich-stat-label {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .word-sandwich-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .word-sandwich-form.is-locked {
      opacity: 0.72;
    }

    .word-sandwich-input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid rgba(143, 223, 255, 0.22);
      border-radius: 18px;
      background: rgba(4, 14, 24, 0.72);
      color: var(--text);
      font: inherit;
      font-size: 20px;
      font-weight: 700;
      text-transform: lowercase;
      outline: none;
    }

    .word-sandwich-input:focus {
      border-color: rgba(39, 194, 255, 0.72);
      box-shadow: 0 0 0 3px rgba(39, 194, 255, 0.18);
    }

    .word-sandwich-submit {
      min-width: 116px;
    }

    .word-sandwich-columns {
      display: grid;
      gap: 14px;
    }

    .word-sandwich-panel {
      padding: 16px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .word-sandwich-panel-title {
      margin: 0 0 12px;
      font-size: 16px;
      font-weight: 800;
      color: #ffffff;
    }

    .word-sandwich-word-list,
    .word-sandwich-board {
      list-style: none;
      margin: 0;
      padding: 0;
      display: grid;
      gap: 10px;
    }

    .word-sandwich-word-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
    }

    .word-sandwich-word-item.is-bonus {
      background: rgba(39,194,255,0.12);
      border: 1px solid rgba(39,194,255,0.18);
    }

    .word-sandwich-word-value {
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      text-transform: lowercase;
    }

    .word-sandwich-word-badge {
      font-size: 11px;
      font-weight: 800;
      color: #92e3ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    .word-sandwich-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.04);
      transition: transform 320ms ease, opacity 320ms ease, background 180ms ease;
      will-change: transform, opacity;
    }

    .word-sandwich-row.is-me {
      background: rgba(39,194,255,0.14);
      border-color: rgba(39,194,255,0.18);
    }

    .word-sandwich-rank {
      width: 24px;
      font-size: 16px;
      font-weight: 900;
      color: #92e3ff;
      text-align: right;
    }

    .word-sandwich-player {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .word-sandwich-player img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      image-rendering: pixelated;
      flex-shrink: 0;
    }

    .word-sandwich-player-name {
      min-width: 0;
      font-size: 16px;
      font-weight: 700;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .word-sandwich-player-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .word-sandwich-count {
      font-size: 15px;
      font-weight: 800;
      color: #ffffff;
      white-space: nowrap;
    }

    .word-sandwich-bonus {
      font-size: 11px;
      font-weight: 800;
      color: #92e3ff;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      white-space: nowrap;
    }

    @media (max-width: 480px) {
      .word-sandwich-form {
        grid-template-columns: 1fr;
      }

      .word-sandwich-stats {
        grid-template-columns: 1fr;
      }
    }
    .word-match-card {
      display: grid;
      gap: 16px;
      padding: 20px;
    }

    .word-match-topline {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .word-match-chip {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(39,194,255,0.12);
      color: #92e3ff;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .word-match-meta-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .word-match-stat {
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      text-align: center;
    }

    .word-match-stat-value {
      display: block;
      font-size: 24px;
      font-weight: 900;
      color: #ffffff;
    }

    .word-match-stat-label {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .word-match-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .word-match-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #2ad1ff, #238dff);
      transition: width 120ms linear, background 160ms ease;
    }

    .word-match-board {
      display: grid;
      gap: 10px;
    }

    .word-match-row {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .word-match-tile {
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(20px, 7vw, 30px);
      font-weight: 900;
      text-transform: uppercase;
      color: #ffffff;
      transition: background 180ms ease, border-color 180ms ease, transform 120ms ease;
    }

    .word-match-tile[data-state="correct"] {
      background: #239b56;
      border-color: rgba(255,255,255,0.22);
    }

    .word-match-tile[data-state="present"] {
      background: #d4ac0d;
      color: #111;
      border-color: rgba(255,255,255,0.18);
    }

    .word-match-tile[data-state="absent"] {
      background: #55606e;
      border-color: rgba(255,255,255,0.12);
    }

    .word-match-form {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
    }

    .word-match-input {
      width: 100%;
      padding: 16px 18px;
      border: 1px solid rgba(143, 223, 255, 0.22);
      border-radius: 18px;
      background: rgba(4, 14, 24, 0.72);
      color: var(--text);
      font: inherit;
      font-size: 20px;
      font-weight: 700;
      text-transform: lowercase;
      outline: none;
    }

    .word-match-input:focus {
      border-color: rgba(39, 194, 255, 0.72);
      box-shadow: 0 0 0 3px rgba(39, 194, 255, 0.18);
    }

    .word-match-message {
      margin: 0;
      color: var(--muted);
      line-height: 1.45;
    }

  </style>
</head>
<body class="theme-shell controller-page">
  <main class="mobile-shell controller-shell" id="mainShell">
    <section class="mobile-card controller-hero" id="heroCard">
      <div class="hero-topline">
        <p class="brand-pill">COUCH CHAOS</p>
        <div class="meta-chip-row">
          <span id="playerChip" class="meta-chip"></span>
          <span id="roomChip" class="meta-chip"></span>
        </div>
      </div>
      <div id="myCharacterBadge" class="my-character-badge" style="display:none">
        <img id="myCharacterImg" class="my-character-img" src="" alt="" />
        <span id="myCharacterName" class="my-character-name"></span>
      </div>
      <h1 id="status" class="page-title">Connecting...</h1>
      <p id="details" class="page-copy">Waiting for the TV.</p>
    </section>

    <section id="content" class="controller-content"></section>
  </main>
  <div id="toastStack" class="toast-stack"></div>

<script>
const socket = io();
const name = localStorage.getItem("name");
const code = localStorage.getItem("code");
let clientId = localStorage.getItem("clientId");
let latestState = null;
let latestPrivateState = { gameId: null };
let votedGameId = null;
let pendingAction = "";
let countdownTimerId = null;
let lastToastKey = "";
let activeQuestionKey = "";
let currentStage = null;
let myCharacter = null;
let wordSandwichBoardOrder = new Map();

if (!name || !code) { window.location.href = "/"; }

if (!clientId) {
  clientId = (window.crypto?.randomUUID?.() || `client-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`);
  localStorage.setItem("clientId", clientId);
}

document.getElementById("playerChip").innerText = name ? `Player: ${name}` : "";
document.getElementById("roomChip").innerText = code ? `Room: ${code}` : "";

// ── Character helpers ──────────────────────────────────────────────
function characterUrl(slug) {
  return slug ? `/Characters/${slug}.svg` : "";
}

function setMyCharacter(slug) {
  if (!slug || myCharacter === slug) return;
  myCharacter = slug;
  const badge = document.getElementById("myCharacterBadge");
  const img   = document.getElementById("myCharacterImg");
  const label = document.getElementById("myCharacterName");
  img.src = characterUrl(slug);
  img.alt = slug;
  label.innerText = name || "You";
  badge.style.display = "flex";
}

// ── DOM helpers ────────────────────────────────────────────────────
function createCard(className = "mobile-card") {
  const s = document.createElement("section");
  s.className = className;
  return s;
}

function createPhaseMessage(title, body) {
  const card = createCard("mobile-card section-card");
  const h = document.createElement("h2"); h.className = "section-title"; h.innerText = title;
  const p = document.createElement("p");  p.className = "section-copy";  p.innerText = body;
  card.appendChild(h); card.appendChild(p);
  return card;
}

function stopCountdownTimer() {
  if (!countdownTimerId) return;
  window.clearInterval(countdownTimerId);
  countdownTimerId = null;
}

function attachCountdown(fill, clock, endsAt, durationMs, options = {}) {
  stopCountdownTimer();
  if (!fill || !endsAt || !durationMs) return;

  const updateTimer = () => {
    const remaining = Math.max(0, endsAt - Date.now());
    const ratio = Math.max(0, Math.min(1, remaining / Math.max(1, durationMs)));
    fill.style.width = `${ratio * 100}%`;
    fill.style.background = ratio <= 0.25
      ? "#e74c3c"
      : ratio <= 0.5
        ? "#f1c40f"
        : (options.safeBackground || "linear-gradient(90deg, #2ad1ff, #238dff)");

    if (clock) {
      clock.innerText = `${(remaining / 1000).toFixed(1)}s`;
    }

    if (remaining <= 0) {
      stopCountdownTimer();
    }
  };

  updateTimer();
  countdownTimerId = window.setInterval(updateTimer, 100);
}

function formatPlace(place) {
  const v = Number(place || 0);
  if (v % 100 >= 11 && v % 100 <= 13) return `${v}th`;
  if (v % 10 === 1) return `${v}st`;
  if (v % 10 === 2) return `${v}nd`;
  if (v % 10 === 3) return `${v}rd`;
  return `${v}th`;
}

function buildTriviaToast(latestResult) {
  if (!latestResult?.questionNumber) return null;
  const title = latestResult.wasCorrect ? `+${latestResult.pointsEarned} points` : "0 points";
  let body = "";
  if (latestResult.timedOut) {
    body = `Time ran out. Total: ${latestResult.totalPoints} pts. Place: ${formatPlace(latestResult.place)}`;
  } else if (latestResult.wasCorrect) {
    const seconds = Math.max(0, Math.round(latestResult.responseTimeMs / 100) / 10);
    body = `Correct in ${seconds}s. Total: ${latestResult.totalPoints} pts. Place: ${formatPlace(latestResult.place)}`;
  } else {
    body = `Wrong answer. Total: ${latestResult.totalPoints} pts. Place: ${formatPlace(latestResult.place)}`;
  }
  return {
    key: `trivia-result-${latestResult.questionNumber}-${latestResult.totalPoints}-${latestResult.timedOut ? "timeout" : "answered"}`,
    title, body
  };
}

function showToast(message) {
  if (!message || !message.key || message.key === lastToastKey) return;
  lastToastKey = message.key;
  const stack = document.getElementById("toastStack");
  const toast = document.createElement("div");
  toast.className = "toast-card";
  const t = document.createElement("p"); t.className = "toast-title"; t.innerText = message.title;
  const b = document.createElement("p"); b.className = "toast-copy";  b.innerText = message.body;
  const dismiss = () => {
    if (!toast.isConnected) return;
    toast.classList.add("is-hiding");
    window.setTimeout(() => { if (toast.isConnected) toast.remove(); }, 150);
  };
  toast.appendChild(t); toast.appendChild(b);
  toast.addEventListener("click", dismiss);
  stack.appendChild(toast);
  window.setTimeout(dismiss, 3000);
}

function sendGameAction(action, payload, onSuccess) {
  pendingAction = action;
  socket.emit("game_action", { code, action, payload }, (response) => {
    pendingAction = "";
    if (!response?.ok) {
      document.getElementById("details").innerText = response?.error || "Unable to submit action.";
      render(latestState, latestPrivateState);
      return;
    }
    if (typeof onSuccess === "function") onSuccess(response);
    render(latestState, latestPrivateState);
  });
}

// ── Character avatar ───────────────────────────────────────────────
function buildCharacterAvatar(slug, label, size = 48, dimmed = false, highlight = false) {
  const wrap = document.createElement("div");
  wrap.className = "character-avatar" + (dimmed ? " is-dimmed" : "") + (highlight ? " is-highlight" : "");
  const img = document.createElement("img");
  img.src = characterUrl(slug); img.alt = label || slug;
  img.width = size; img.height = size;
  wrap.appendChild(img);
  if (label) {
    const lbl = document.createElement("span");
    lbl.className = "character-avatar-label"; lbl.innerText = label;
    wrap.appendChild(lbl);
  }
  return wrap;
}

function buildVoterPips(voterCharacters) {
  if (!voterCharacters?.length) return null;
  const row = document.createElement("div"); row.className = "voter-pips";
  for (const slug of voterCharacters) {
    const pip = document.createElement("img");
    pip.src = characterUrl(slug); pip.alt = slug; pip.className = "voter-pip";
    row.appendChild(pip);
  }
  return row;
}

function animateWordSandwichBoard(list, entries) {
  const nextOrder = new Map();
  const rowHeight = 66;

  entries.forEach((entry, index) => {
    nextOrder.set(entry.id, index);
    const row = list.querySelector(`[data-player-id="${entry.id}"]`);
    if (!row) return;

    const previousIndex = wordSandwichBoardOrder.get(entry.id);
    const offset = previousIndex == null ? 18 : (previousIndex - index) * rowHeight;
    row.style.transform = previousIndex == null ? "translateX(18px)" : `translateY(${offset}px)`;
    row.style.opacity = previousIndex == null ? "0" : "0.84";
  });

  requestAnimationFrame(() => {
    entries.forEach((entry) => {
      const row = list.querySelector(`[data-player-id="${entry.id}"]`);
      if (!row) return;
      row.style.transform = "translateX(0) translateY(0)";
      row.style.opacity = "1";
    });
  });

  wordSandwichBoardOrder = nextOrder;
}

// ── Kahoot-style answer grid renderer ─────────────────────────────
function renderKahootAnswerGrid(container, view) {
  const heroCard = document.getElementById("heroCard");
  const mainShell = document.getElementById("mainShell");

  // Switch to full-screen trivia layout
  mainShell.className = "trivia-shell";
  heroCard.style.display = "none";

  const isReveal = Boolean(view.isReveal);
  const correctColor = view.correctColor;
  const myAnswer = view.myAnswerColor;

  const latestResult = view.latestResult;

  // ── Question bar ──
  const bar = document.createElement("div");
  bar.className = "trivia-question-bar";

  // Difficulty badge
  if (view.difficultyLabel) {
    const diff = document.createElement("p");
    diff.className = "difficulty-badge";
    diff.setAttribute("data-difficulty", view.difficulty || 1);
    diff.innerText = view.difficultyLabel;
    bar.appendChild(diff);
  }

  const kicker = document.createElement("p");
  kicker.className = "trivia-question-kicker";
  kicker.innerText = view.title || `Question ${view.questionNumber}`;
  bar.appendChild(kicker);

  const questionText = document.createElement("p");
  questionText.className = "trivia-question-text";
  questionText.innerText = view.details || "";
  bar.appendChild(questionText);

  // Timer + status row
  const metaRow = document.createElement("div");
  metaRow.className = "trivia-meta-row";

  const timerTrack = document.createElement("div");
  timerTrack.className = "trivia-timer-track";
  const timerFill = document.createElement("div");
  timerFill.className = "trivia-timer-fill";
  timerFill.id = "kahootTimerFill";
  timerTrack.appendChild(timerFill);

  const statusChip = document.createElement("span");
  statusChip.className = "trivia-status-chip";
  statusChip.id = "kahootStatusChip";

  if (isReveal) {
    statusChip.innerText = "Reveal!";
    timerFill.style.width = "0%";
    timerFill.style.background = "#e74c3c";
  } else {
    statusChip.innerText = hasAnswered ? "Locked in!" : "Choose…";
  }

  metaRow.appendChild(timerTrack);
  metaRow.appendChild(statusChip);
  bar.appendChild(metaRow);
  container.appendChild(bar);

  // ── Result banner (if reveal and I had answered) ──
  if (isReveal && latestResult && !latestResult.timedOut) {
    const banner = document.createElement("div");
    const wasCorrect = latestResult.wasCorrect;
    banner.className = `trivia-result-banner ${wasCorrect ? "correct" : "wrong"}`;

    const emoji = document.createElement("div");
    emoji.className = "trivia-result-emoji";
    emoji.innerText = wasCorrect ? "✅" : "❌";

    const title = document.createElement("div");
    title.className = "trivia-result-title";
    title.innerText = wasCorrect
      ? `+${latestResult.pointsEarned} pts`
      : "Wrong!";

    const sub = document.createElement("p");
    sub.className = "trivia-result-sub";
    sub.innerText = wasCorrect
      ? `Speed bonus included! Total: ${latestResult.totalPoints} pts`
      : `Correct was ${correctColor ? correctColor.toUpperCase() : "?"}. Total: ${latestResult.totalPoints} pts`;

    banner.appendChild(emoji);
    banner.appendChild(title);
    banner.appendChild(sub);
    container.appendChild(banner);
  } else if (isReveal && latestResult?.timedOut) {
    const banner = document.createElement("div");
    banner.className = "trivia-result-banner timed-out";
    const emoji = document.createElement("div"); emoji.className = "trivia-result-emoji"; emoji.innerText = "⏱️";
    const title = document.createElement("div"); title.className = "trivia-result-title"; title.innerText = "Time's up!";
    const sub = document.createElement("p"); sub.className = "trivia-result-sub";
    sub.innerText = `Correct was ${correctColor ? correctColor.toUpperCase() : "?"}. Total: ${latestResult.totalPoints} pts`;
    banner.appendChild(emoji); banner.appendChild(title); banner.appendChild(sub);
    container.appendChild(banner);
  } else if (!isReveal && hasAnswered) {
    const chip = document.createElement("div");
    chip.className = "waiting-chip";
    chip.innerHTML = `<span>⏳</span> Waiting for others…`;
    chip.style.margin = "4px 8px 0";
    container.appendChild(chip);
  }

  // ── Color button grid ──
  const answersArea = document.createElement("div");
  answersArea.className = "trivia-answers-area";

  const grid = document.createElement("div");
  grid.className = "kahoot-grid";

  (view.options || []).forEach((option) => {
    const btn = document.createElement("button");
    const colorClass = option.id;
    let classes = `kahoot-btn ${colorClass}`;

    if (isReveal) {
      if (option.isCorrect) {
        classes += " is-correct";
      } else {
        classes += " is-wrong";
      }
    } else if (myAnswer === option.id) {
      classes += " is-my-answer";
    }

    btn.className = classes;
    btn.disabled = hasAnswered || isReveal;

    if (!hasAnswered && !isReveal) {
      btn.onclick = () => sendGameAction("submit_answer", { answerColor: option.id });
    }

    grid.appendChild(btn);
  });

  answersArea.appendChild(grid);
  container.appendChild(answersArea);

  // ── Start countdown timer ──
  if (!isReveal && view.questionEndsAt) {
    stopCountdownTimer();
    const fill = document.getElementById("kahootTimerFill");
    const chip = document.getElementById("kahootStatusChip");
    const totalMs = view.questionDurationMs || 6000;

    const updateTimer = () => {
      const remaining = Math.max(0, view.questionEndsAt - Date.now());
      const ratio = remaining / totalMs;
      if (fill) {
        fill.style.width = `${ratio * 100}%`;
        fill.style.background = ratio <= 0.25 ? "#e74c3c" : ratio <= 0.5 ? "#f1c40f" : "#27c2ff";
      }
      if (chip && !hasAnswered) {
        chip.innerText = `${(remaining / 1000).toFixed(1)}s`;
      }
      if (remaining <= 0) stopCountdownTimer();
    };

    updateTimer();
    countdownTimerId = window.setInterval(updateTimer, 100);
  }
}

    const timerWrap = document.createElement("div");
    timerWrap.className = "imposter-timer-wrap";
    const timerMeta = document.createElement("div");
    timerMeta.className = "imposter-timer-meta";
    const timerLabel = document.createElement("span");
    timerLabel.innerText = view.timerLabel || "Voting";
    const timerClock = document.createElement("span");
    timerClock.id = "imposterVoteClock";
    timerMeta.appendChild(timerLabel);
    timerMeta.appendChild(timerClock);
    const timerTrack = document.createElement("div");
    timerTrack.className = "imposter-timer-track";
    const timerFill = document.createElement("div");
    timerFill.className = "imposter-timer-fill";
    timerFill.id = "imposterVoteFill";
    timerTrack.appendChild(timerFill);
    timerWrap.appendChild(timerMeta);
    timerWrap.appendChild(timerTrack);
    card.appendChild(timerWrap);
  }
  const grid = document.createElement("div"); grid.className = "player-vote-grid";
  (view.players || []).forEach((player) => {
    const isVotedFor = view.myVoteTargetId === player.id;
    const cell = document.createElement("div");
    cell.className = "player-vote-cell" + (isVotedFor ? " is-my-vote" : "") + (player.disabled && !isVotedFor ? " is-locked" : "");
    const portrait = document.createElement("div"); portrait.className = "player-vote-portrait";
    if (player.character) { const img = document.createElement("img"); img.src = characterUrl(player.character); img.alt = player.label; portrait.appendChild(img); }
    if (player.voterCharacters?.length > 0) { const pips = buildVoterPips(player.voterCharacters); if (pips) portrait.appendChild(pips); }
    const label = document.createElement("span"); label.className = "player-vote-name"; label.innerText = player.label;
    if (isVotedFor) { const badge = document.createElement("span"); badge.className = "player-vote-my-badge"; badge.innerText = "Your vote"; cell.appendChild(portrait); cell.appendChild(label); cell.appendChild(badge); }
    else { cell.appendChild(portrait); cell.appendChild(label); }
    if (!player.disabled) { cell.onclick = () => sendGameAction("cast_vote", { targetPlayerId: player.id }); cell.style.cursor = "pointer"; }
    grid.appendChild(cell);
  });
  card.appendChild(grid); content.appendChild(card);

  if (view.phaseEndsAt && view.phaseDurationMs) {
    attachCountdown(
      document.getElementById("imposterVoteFill"),
      document.getElementById("imposterVoteClock"),
      view.phaseEndsAt,
      view.phaseDurationMs
    );
  } else {
    stopCountdownTimer();
  }
}

function renderWordMatch(content, view, detailsEl) {
  detailsEl.innerText = view.details || "Guess the hidden word.";

  const card = createCard("mobile-card word-match-card");
  const topline = document.createElement("div");
  topline.className = "word-match-topline";

  const headingBlock = document.createElement("div");
  const heading = document.createElement("h2");
  heading.className = "section-title";
  heading.innerText = view.title || "Word Match";
  const subcopy = document.createElement("p");
  subcopy.className = "word-match-message";
  subcopy.innerText = view.isRoundComplete
    ? (view.revealedWord ? `Round complete. The word was ${view.revealedWord}.` : "Round complete.")
    : "Green means right letter and right spot. Yellow means the letter belongs elsewhere.";
  headingBlock.appendChild(heading);
  headingBlock.appendChild(subcopy);

  const roundChip = document.createElement("span");
  roundChip.className = "word-match-chip";
  roundChip.innerText = `Round ${view.roundNumber}/${view.roundTotal}`;

  topline.appendChild(headingBlock);
  topline.appendChild(roundChip);
  card.appendChild(topline);

  const stats = document.createElement("div");
  stats.className = "word-match-meta-row";
  stats.innerHTML = `
    <div class="word-match-stat">
      <span class="word-match-stat-value">${view.playerScore || 0}</span>
      <span class="word-match-stat-label">Score</span>
    </div>
    <div class="word-match-stat">
      <span class="word-match-stat-value">${view.attemptsUsed || 0}/${view.maxAttempts || 6}</span>
      <span class="word-match-stat-label">Tries</span>
    </div>
    <div class="word-match-stat">
      <span class="word-match-stat-value">${view.wordLength || 5}</span>
      <span class="word-match-stat-label">Letters</span>
    </div>`;
  card.appendChild(stats);

  if (view.roundEndsAt) {
    const timerTrack = document.createElement("div");
    timerTrack.className = "word-match-track";
    const timerFill = document.createElement("div");
    timerFill.className = "word-match-fill";
    timerFill.id = "wordMatchFill";
    timerTrack.appendChild(timerFill);
    card.appendChild(timerTrack);
  }

  const board = document.createElement("div");
  board.className = "word-match-board";
  (view.rows || []).forEach((row) => {
    const rowEl = document.createElement("div");
    rowEl.className = "word-match-row";
    const letters = (row.guess || "").toUpperCase().split("");
    for (let i = 0; i < (view.wordLength || 5); i += 1) {
      const tile = document.createElement("div");
      tile.className = "word-match-tile";
      tile.dataset.state = row.feedback?.[i] || "empty";
      tile.innerText = letters[i] || "";
      rowEl.appendChild(tile);
    }
    board.appendChild(rowEl);
  });
  card.appendChild(board);

  const form = document.createElement("form");
  form.className = "word-match-form";
  const input = document.createElement("input");
  input.className = "word-match-input";
  input.type = "text";
  input.maxLength = view.wordLength || 5;
  input.placeholder = view.isRoundComplete ? "Round complete" : `Enter a ${view.wordLength || 5}-letter word`;
  input.disabled = !view.canSubmit || pendingAction === "submit_guess";
  input.autocomplete = "off";
  input.spellcheck = false;
  const submit = document.createElement("button");
  submit.className = "primary-btn";
  submit.type = "submit";
  submit.disabled = !view.canSubmit || pendingAction === "submit_guess";
  submit.innerText = pendingAction === "submit_guess" ? "Sending" : "Submit";
  form.appendChild(input);
  form.appendChild(submit);
  form.addEventListener("submit", (event) => {
    event.preventDefault();
    const guess = (input.value || "").trim().toLowerCase();
    if (!view.canSubmit || pendingAction === "submit_guess") return;
    if (guess.length !== (view.wordLength || 5)) {
      detailsEl.innerText = `Enter a ${view.wordLength || 5}-letter word.`;
      return;
    }
    sendGameAction("submit_guess", { guess }, (response) => {
      if (response?.ok) input.value = "";
    });
  });
  card.appendChild(form);

  const message = document.createElement("p");
  message.className = "word-match-message";
  if (view.latestResult?.solved) {
    message.innerText = `Solved in ${view.latestResult.triesUsed} ${view.latestResult.triesUsed === 1 ? "try" : "tries"} for +${view.latestResult.pointsEarned} points.`;
  } else if (view.isRoundComplete) {
    message.innerText = view.revealedWord ? `Round complete. The word was ${view.revealedWord}.` : "Round complete.";
  } else {
    message.innerText = "Use the same hidden word as everyone else. Fewer guesses and faster solves score better.";
  }
  card.appendChild(message);

  content.appendChild(card);

  if (view.roundEndsAt) {
    attachCountdown(
      document.getElementById("wordMatchFill"),
      null,
      view.roundEndsAt,
      view.roundDurationMs || 45000
    );
  } else {
    stopCountdownTimer();
  }
}

// ── Renderers map ──────────────────────────────────────────────────
const renderers = {
  message(content, view, privateState) {
    // Restore normal layout when leaving trivia
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderPrivateCard(content, privateState);
    content.appendChild(createPhaseMessage(view.title || "Controller ready", view.details || "Look at the TV."));
  },
  game_vote(content, view, privateState, detailsEl) {
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderPrivateCard(content, privateState);
    renderGameVote(content, view, detailsEl);
  },
  answer_grid(content, view, privateState) {
    // Full-screen Kahoot mode — hero card hidden inside
    renderKahootAnswerGrid(content, view);
    if (view.latestResult && view.isReveal) {
      showToast(buildTriviaToast(view.latestResult));
    }
  },
  leaderboard(content, view, privateState) {
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderPrivateCard(content, privateState);
    renderLeaderboard(content, view, privateState);
  },
  imposter_round(content, view, privateState) {
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderImposterRound(content, view, privateState);
  },
  player_vote(content, view, privateState) {
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderPlayerVote(content, view, privateState);
  },
  word_sandwiches(content, view, privateState, detailsEl) {
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderWordSandwiches(content, view, detailsEl);
  },
  word_guess(content, view, privateState, detailsEl) {
    const heroCard = document.getElementById("heroCard");
    const mainShell = document.getElementById("mainShell");
    mainShell.className = "mobile-shell controller-shell";
    heroCard.style.display = "";
    renderWordMatch(content, view, detailsEl);
  }
};

// ── Main render ───────────────────────────────────────────────────
function render(state, privateState = {}) {
  const content  = document.getElementById("content");
  const status   = document.getElementById("status");
  const details  = document.getElementById("details");
  const view = state?.controllerView || { layout: "message", title: "Look at the TV", details: "Waiting for the next prompt." };

  document.body.setAttribute("data-phase", state?.phase || "waiting");
  status.innerText  = view.title   || "Look at the TV";
  details.innerText = view.details || "Waiting for the next prompt.";

  // Sync my character
  if (state?.players) {
    const storedName = localStorage.getItem("name");
    const me = state.players.find((p) => storedName && p.name && p.name.toLowerCase() === storedName.toLowerCase());
    if (me?.character) setMyCharacter(me.character);
  }

  const stage = document.createElement("div");
  stage.className = "controller-stage";
  const renderer = renderers[view.layout] || renderers.message;
  renderer(stage, view, privateState, details);

  const nextQuestionKey = view.layout === "answer_grid"
    ? `answer_grid:${view.questionNumber || view.title || ""}:${view.isReveal ? "reveal" : "active"}`
    : view.layout;

  if (!currentStage) {
    content.innerHTML = "";
    content.appendChild(stage);
    currentStage = stage;
  } else if (nextQuestionKey !== activeQuestionKey && view.layout === "answer_grid" && !view.isReveal) {
    const prev = currentStage;
    prev.classList.remove("is-entering");
    prev.classList.add("is-leaving");
    stage.classList.add("is-entering");
    content.appendChild(stage);
    currentStage = stage;
    window.setTimeout(() => { if (prev.isConnected) prev.remove(); }, 220);
  } else {
    content.innerHTML = "";
    content.appendChild(stage);
    currentStage = stage;
  }
  activeQuestionKey = nextQuestionKey;

  const countdownLayouts = new Set(["answer_grid", "word_sandwiches", "word_guess", "imposter_round", "player_vote"]);
  if (!countdownLayouts.has(view.layout)) {
    stopCountdownTimer();
  }

  if (view.latestResult && view.layout !== "answer_grid") {
    showToast(buildTriviaToast(view.latestResult));
  }
}

// ── Socket events ─────────────────────────────────────────────────
socket.on("connect", () => {
  socket.emit("join_room", { code, name, clientId });
  document.getElementById("status").innerText = "Connected";
});

socket.on("player_identity", (identity) => {
  if (identity?.clientId) { clientId = identity.clientId; localStorage.setItem("clientId", identity.clientId); }
  if (identity?.name) { localStorage.setItem("name", identity.name); document.getElementById("playerChip").innerText = `Player: ${identity.name}`; }
});

socket.on("game_state", (state) => {
  latestState = state;
  if (state?.phase !== "game_select") votedGameId = null;
  render(latestState, latestPrivateState);
});

socket.on("private_state", (privateState) => {
  latestPrivateState = privateState || { gameId: null };
  render(latestState, latestPrivateState);
});

socket.on("error_message", (msg) => {
  alert(msg);
  if (msg === "That name is already taken") {
    localStorage.removeItem("name");
    window.location.href = `/name.html?code=${encodeURIComponent(code)}`;
    return;
  }
  window.location.href = "/";
});
</script>
