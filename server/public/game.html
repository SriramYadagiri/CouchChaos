<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Couch Chaos | Controller</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="/socket.io/socket.io.js"></script>
  <style>
    .difficulty-badge {
      display: inline-block;
      margin-bottom: 8px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
 
    .difficulty-badge[data-difficulty="1"] {
      background: rgba(39, 194, 100, 0.18);
      color: #4ddb8a;
    }
 
    .difficulty-badge[data-difficulty="2"] {
      background: rgba(212, 172, 13, 0.18);
      color: #f0c830;
    }
 
    .difficulty-badge[data-difficulty="3"] {
      background: rgba(255, 108, 129, 0.18);
      color: #ff6c81;
    }
  </style>
</head>
<body class="theme-shell controller-page">
  <main class="mobile-shell controller-shell">
    <section class="mobile-card controller-hero">
      <div class="hero-topline">
        <p class="brand-pill">COUCH CHAOS</p>
        <div class="meta-chip-row">
          <span id="playerChip" class="meta-chip"></span>
          <span id="roomChip" class="meta-chip"></span>
        </div>
      </div>
      <div id="myCharacterBadge" class="my-character-badge" style="display:none">
        <img id="myCharacterImg" class="my-character-img" src="" alt="" />
        <span id="myCharacterName" class="my-character-name"></span>
      </div>
      <h1 id="status" class="page-title">Connecting...</h1>
      <p id="details" class="page-copy">Waiting for the TV.</p>
    </section>

    <section id="content" class="controller-content"></section>
  </main>
  <div id="toastStack" class="toast-stack"></div>

<script>
const socket = io();
const name = localStorage.getItem("name");
const code = localStorage.getItem("code");
let clientId = localStorage.getItem("clientId");
let latestState = null;
let latestPrivateState = { gameId: null };
let votedGameId = null;
let pendingAction = "";
let countdownTimerId = null;
let lastToastKey = "";
let activeQuestionKey = "";
let currentStage = null;
let myCharacter = null; // assigned character slug for this player

if (!name || !code) {
  window.location.href = "/";
}

if (!clientId) {
  if (window.crypto && typeof window.crypto.randomUUID === "function") {
    clientId = window.crypto.randomUUID();
  } else {
    clientId = `client-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
  }
  localStorage.setItem("clientId", clientId);
}

document.getElementById("playerChip").innerText = name ? `Player: ${name}` : "";
document.getElementById("roomChip").innerText = code ? `Room: ${code}` : "";

// ---- Character helpers ----
function characterUrl(slug) {
  if (!slug) return "";
  return `/Characters/${slug}.svg`;
}

function setMyCharacter(slug) {
  if (!slug || myCharacter === slug) return;
  myCharacter = slug;
  const badge = document.getElementById("myCharacterBadge");
  const img = document.getElementById("myCharacterImg");
  const label = document.getElementById("myCharacterName");
  img.src = characterUrl(slug);
  img.alt = slug;
  label.innerText = name || "You";
  badge.style.display = "flex";
}

// ---- DOM helpers ----
function createCard(className = "mobile-card") {
  const section = document.createElement("section");
  section.className = className;
  return section;
}

function createPhaseMessage(title, body) {
  const card = createCard("mobile-card section-card");
  const heading = document.createElement("h2");
  heading.className = "section-title";
  heading.innerText = title;

  const copy = document.createElement("p");
  copy.className = "section-copy";
  copy.innerText = body;

  card.appendChild(heading);
  card.appendChild(copy);
  return card;
}

function stopCountdownTimer() {
  if (!countdownTimerId) return;
  window.clearInterval(countdownTimerId);
  countdownTimerId = null;
}

function formatPlace(place) {
  const value = Number(place || 0);
  if (value % 100 >= 11 && value % 100 <= 13) return `${value}th`;
  if (value % 10 === 1) return `${value}st`;
  if (value % 10 === 2) return `${value}nd`;
  if (value % 10 === 3) return `${value}rd`;
  return `${value}th`;
}

function buildTriviaToast(latestResult) {
  if (!latestResult || !latestResult.questionNumber) return null;

  const title = latestResult.wasCorrect ? `+${latestResult.pointsEarned} points` : "0 points";
  let body = "";

  if (latestResult.timedOut) {
    body = `Time ran out. Total: ${latestResult.totalPoints} pts. Place: ${formatPlace(latestResult.place)}`;
  } else if (latestResult.wasCorrect) {
    const seconds = Math.max(0, Math.round(latestResult.responseTimeMs / 100) / 10);
    body = `Correct in ${seconds}s. Total: ${latestResult.totalPoints} pts. Place: ${formatPlace(latestResult.place)}`;
  } else {
    body = `Wrong answer. Total: ${latestResult.totalPoints} pts. Place: ${formatPlace(latestResult.place)}`;
  }

  return {
    key: `trivia-result-${latestResult.questionNumber}-${latestResult.totalPoints}-${latestResult.timedOut ? "timeout" : "answered"}`,
    title,
    body
  };
}

function showToast(message) {
  if (!message || !message.key || message.key === lastToastKey) return;
  lastToastKey = message.key;

  const stack = document.getElementById("toastStack");
  const toast = document.createElement("div");
  toast.className = "toast-card";

  const title = document.createElement("p");
  title.className = "toast-title";
  title.innerText = message.title;

  const body = document.createElement("p");
  body.className = "toast-copy";
  body.innerText = message.body;

  const dismiss = () => {
    if (!toast.isConnected) return;
    toast.classList.add("is-hiding");
    window.setTimeout(() => {
      if (toast.isConnected) toast.remove();
    }, 150);
  };

  toast.appendChild(title);
  toast.appendChild(body);
  toast.addEventListener("click", dismiss);
  stack.appendChild(toast);
  window.setTimeout(dismiss, 3000);
}

function attachCountdown(detailsEl, questionEndsAt) {
  stopCountdownTimer();
  if (!questionEndsAt) return;

  const updateCountdown = () => {
    const remainingMs = Math.max(0, questionEndsAt - Date.now());
    const seconds = (remainingMs / 1000).toFixed(1);
    detailsEl.innerText = `Choose quickly. ${seconds}s left`;
    if (remainingMs <= 0) {
      stopCountdownTimer();
      detailsEl.innerText = "Time is up. Waiting for results.";
    }
  };

  updateCountdown();
  countdownTimerId = window.setInterval(updateCountdown, 100);
}

function sendGameAction(action, payload, onSuccess) {
  pendingAction = action;
  socket.emit("game_action", { code, action, payload }, (response) => {
    pendingAction = "";

    if (!response?.ok) {
      document.getElementById("details").innerText = response?.error || "Unable to submit action.";
      render(latestState, latestPrivateState);
      return;
    }

    if (typeof onSuccess === "function") onSuccess();
    render(latestState, latestPrivateState);
  });
}

// ---- Character avatar builder ----
function buildCharacterAvatar(slug, label, size = 48, dimmed = false, highlight = false) {
  const wrap = document.createElement("div");
  wrap.className = "character-avatar" + (dimmed ? " is-dimmed" : "") + (highlight ? " is-highlight" : "");

  const img = document.createElement("img");
  img.src = characterUrl(slug);
  img.alt = label || slug;
  img.width = size;
  img.height = size;
  wrap.appendChild(img);

  if (label) {
    const lbl = document.createElement("span");
    lbl.className = "character-avatar-label";
    lbl.innerText = label;
    wrap.appendChild(lbl);
  }

  return wrap;
}

// Renders a row of small voter character icons above/beside a vote target
function buildVoterPips(voterCharacters) {
  if (!voterCharacters || voterCharacters.length === 0) return null;
  const row = document.createElement("div");
  row.className = "voter-pips";
  for (const slug of voterCharacters) {
    const pip = document.createElement("img");
    pip.src = characterUrl(slug);
    pip.alt = slug;
    pip.className = "voter-pip";
    row.appendChild(pip);
  }
  return row;
}

// ---- Renderers ----
function renderPrivateCard(content, privateState) {
  if (!privateState || !privateState.gameId || !privateState.title) return;

  const card = createCard("mobile-card section-card");
  const heading = document.createElement("h2");
  heading.className = "section-title";
  heading.innerText = privateState.title;

  const body = document.createElement("p");
  body.className = "question-text";
  body.innerText = privateState.message || "";

  card.appendChild(heading);
  card.appendChild(body);

  if (privateState.footer) {
    const footer = document.createElement("p");
    footer.className = "section-copy";
    footer.style.marginTop = "12px";
    footer.innerText = privateState.footer;
    card.appendChild(footer);
  }

  content.appendChild(card);
}

function renderGameVote(content, view, detailsEl) {
  detailsEl.innerText = votedGameId
    ? "Your vote is locked in."
    : (view.details || "Choose a minigame on your phone.");

  const grid = document.createElement("div");
  grid.className = "vote-grid";

  (view.options || []).forEach((option) => {
    const btn = document.createElement("button");
    btn.className = `vote-card${votedGameId === option.id ? " is-selected" : ""}`;
    btn.disabled = Boolean(votedGameId);

    const title = document.createElement("span");
    title.className = "vote-card-title";
    title.innerText = option.label;

    const desc = document.createElement("span");
    desc.className = "vote-card-copy";
    desc.innerText = option.description || "";

    const meta = document.createElement("span");
    meta.className = "vote-card-meta";
    meta.innerText = option.meta || "";

    btn.appendChild(title);
    btn.appendChild(desc);
    btn.appendChild(meta);

    btn.onclick = () => {
      socket.emit("vote_game", { code, gameId: option.id }, (response) => {
        if (!response?.ok) {
          detailsEl.innerText = response?.error || "Unable to submit vote.";
          render(latestState, latestPrivateState);
          return;
        }

        votedGameId = option.id;
        render(latestState, latestPrivateState);
      });
    };

    grid.appendChild(btn);
  });

  content.appendChild(grid);
}

function renderAnswerGrid(content, view) {
  const promptCard = createCard("mobile-card section-card");

  if (view.difficultyLabel) {
    const difficultyBadge = document.createElement("p");
    difficultyBadge.className = "question-kicker difficulty-badge";
    difficultyBadge.setAttribute("data-difficulty", view.difficulty || 1);
    difficultyBadge.innerText = view.difficultyLabel;
    promptCard.appendChild(difficultyBadge);
  }

  const promptLabel = document.createElement("p");
  promptLabel.className = "question-kicker";
  promptLabel.innerText = "Choose an answer";

  const promptText = document.createElement("p");
  promptText.className = "question-text";
  promptText.innerText = view.details || "Waiting for the next question.";

  promptCard.appendChild(promptLabel);
  promptCard.appendChild(promptText);
  content.appendChild(promptCard);

  const optionWrap = document.createElement("div");
  optionWrap.className = "answer-grid";

  (view.options || []).forEach((option) => {
    const btn = document.createElement("button");
    btn.className = "answer-card";
    btn.disabled = pendingAction === option.action;
    btn.style.backgroundColor = option.background || "#1b496e";
    btn.style.color = option.color || "#ffffff";

    const label = document.createElement("span");
    label.className = "answer-card-title";
    label.innerText = option.label;

    const copy = document.createElement("span");
    copy.className = "answer-card-copy";
    copy.innerText = option.description || "";

    btn.appendChild(label);
    btn.appendChild(copy);
    btn.onclick = () => sendGameAction(option.action, option.payload);
    optionWrap.appendChild(btn);
  });

  content.appendChild(optionWrap);
}

function renderLeaderboard(content, view) {
  const board = document.createElement("section");
  board.className = "mobile-card leaderboard-card";

  const heading = document.createElement("h2");
  heading.className = "section-title";
  heading.innerText = view.title || "Standings";
  board.appendChild(heading);

  const list = document.createElement("ol");
  list.className = "leaderboard-list";

  (view.items || []).forEach((entry) => {
    const item = document.createElement("li");
    item.className = "leaderboard-row";

    // Character icon if available
    if (entry.character) {
      const avatar = document.createElement("img");
      avatar.src = characterUrl(entry.character);
      avatar.alt = entry.label;
      avatar.className = "leaderboard-character-icon";
      item.appendChild(avatar);
    }

    const nameEl = document.createElement("span");
    nameEl.className = "leaderboard-name";
    nameEl.innerText = entry.label;

    const valueEl = document.createElement("span");
    valueEl.className = "leaderboard-score";
    valueEl.innerText = entry.value || "";

    item.appendChild(nameEl);
    item.appendChild(valueEl);
    list.appendChild(item);
  });

  board.appendChild(list);
  content.appendChild(board);
}

function renderImposterRound(content, view, privateState) {
  renderPrivateCard(content, privateState);
  content.appendChild(createPhaseMessage("Hint round", view.details || "Give one spoken hint."));

  const actionCard = createCard("mobile-card section-card");
  const actionTitle = document.createElement("h2");
  actionTitle.className = "section-title";
  actionTitle.innerText = "Actions";
  actionCard.appendChild(actionTitle);

  if (view.canAdvanceTurn) {
    const nextTurnBtn = document.createElement("button");
    nextTurnBtn.className = "primary-btn";
    nextTurnBtn.style.marginTop = "16px";
    nextTurnBtn.innerText = "Pass Turn";
    nextTurnBtn.onclick = () => sendGameAction("advance_turn", {});
    actionCard.appendChild(nextTurnBtn);
  }

  if (view.canStartVote) {
    const voteBtn = document.createElement("button");
    voteBtn.className = "primary-btn";
    voteBtn.style.marginTop = "16px";
    voteBtn.innerText = "Start Voting";
    voteBtn.onclick = () => sendGameAction("start_vote", {});
    actionCard.appendChild(voteBtn);
  }

  content.appendChild(actionCard);

  const board = document.createElement("section");
  board.className = "mobile-card leaderboard-card";

  const heading = document.createElement("h2");
  heading.className = "section-title";
  heading.innerText = "Players";
  board.appendChild(heading);

  const list = document.createElement("ol");
  list.className = "leaderboard-list";

  (view.players || []).forEach((player) => {
    const item = document.createElement("li");
    item.className = "leaderboard-row";

    if (player.character) {
      const avatar = document.createElement("img");
      avatar.src = characterUrl(player.character);
      avatar.alt = player.name;
      avatar.className = "leaderboard-character-icon";
      item.appendChild(avatar);
    }

    const nameEl = document.createElement("span");
    nameEl.className = "leaderboard-name";
    nameEl.innerText = player.name;

    const valueEl = document.createElement("span");
    valueEl.className = "leaderboard-score";
    valueEl.innerText = player.id === view.currentSpeakerId ? "Speaking" : (player.isEliminated ? "Out" : "Ready");

    item.appendChild(nameEl);
    item.appendChild(valueEl);
    list.appendChild(item);
  });

  board.appendChild(list);
  content.appendChild(board);
}

// Among Us-style player vote renderer
function renderPlayerVote(content, view, privateState) {
  renderPrivateCard(content, privateState);

  const card = createCard("mobile-card section-card");
  const title = document.createElement("h2");
  title.className = "section-title";
  title.innerText = view.title || "Vote";
  card.appendChild(title);

  if (view.details) {
    const sub = document.createElement("p");
    sub.className = "section-copy";
    sub.style.marginBottom = "16px";
    sub.innerText = view.details;
    card.appendChild(sub);
  }

  const grid = document.createElement("div");
  grid.className = "player-vote-grid";

  (view.players || []).forEach((player) => {
    const isVotedFor = view.myVoteTargetId === player.id;
    const cell = document.createElement("div");
    cell.className = "player-vote-cell" + (isVotedFor ? " is-my-vote" : "") + (player.disabled && !isVotedFor ? " is-locked" : "");

    // Character portrait
    const portrait = document.createElement("div");
    portrait.className = "player-vote-portrait";
    if (player.character) {
      const img = document.createElement("img");
      img.src = characterUrl(player.character);
      img.alt = player.label;
      portrait.appendChild(img);
    }

    // Voter pips (characters who voted for this player)
    if (player.voterCharacters && player.voterCharacters.length > 0) {
      const pips = buildVoterPips(player.voterCharacters);
      if (pips) portrait.appendChild(pips);
    }

    // Player name
    const label = document.createElement("span");
    label.className = "player-vote-name";
    label.innerText = player.label;

    // Vote badge if I voted for them
    if (isVotedFor) {
      const badge = document.createElement("span");
      badge.className = "player-vote-my-badge";
      badge.innerText = "Your vote";
      cell.appendChild(portrait);
      cell.appendChild(label);
      cell.appendChild(badge);
    } else {
      cell.appendChild(portrait);
      cell.appendChild(label);
    }

    if (!player.disabled) {
      cell.onclick = () => sendGameAction("cast_vote", { targetPlayerId: player.id });
      cell.style.cursor = "pointer";
    }

    grid.appendChild(cell);
  });

  card.appendChild(grid);
  content.appendChild(card);
}

const renderers = {
  message(content, view, privateState) {
    renderPrivateCard(content, privateState);
    content.appendChild(createPhaseMessage(view.title || "Controller ready", view.details || "Look at the TV for the next round."));
  },
  game_vote(content, view, privateState, detailsEl) {
    renderPrivateCard(content, privateState);
    renderGameVote(content, view, detailsEl);
  },
  answer_grid(content, view, privateState) {
    renderPrivateCard(content, privateState);
    renderAnswerGrid(content, view);
  },
  leaderboard(content, view, privateState) {
    renderPrivateCard(content, privateState);
    renderLeaderboard(content, view);
  },
  imposter_round(content, view, privateState) {
    renderImposterRound(content, view, privateState);
  },
  player_vote(content, view, privateState) {
    renderPlayerVote(content, view, privateState);
  }
};

function render(state, privateState = {}) {
  const content = document.getElementById("content");
  const status = document.getElementById("status");
  const details = document.getElementById("details");
  const view = state?.controllerView || {
    layout: "message",
    title: "Look at the TV",
    details: "Waiting for the next prompt."
  };
  document.body.setAttribute("data-phase", state?.phase || "waiting");
  status.innerText = view.title || "Look at the TV";
  details.innerText = view.details || "Waiting for the next prompt.";

  // Sync my character from player list
  if (state?.players) {
    const myEntry = state.players.find((p) => p.clientId === clientId || p.name === name);
    if (!myEntry) {
      // Try matching by socket id via playerCharacters map
    }
    // playerCharacters map is keyed by socket id which we don't store client-side,
    // but players array now includes character, so look up by name
    const me = state.players.find((p) => {
      const storedName = localStorage.getItem("name");
      return storedName && p.name && p.name.toLowerCase() === storedName.toLowerCase();
    });
    if (me && me.character) setMyCharacter(me.character);
  }

  const stage = document.createElement("div");
  stage.className = "controller-stage";
  const renderer = renderers[view.layout] || renderers.message;
  renderer(stage, view, privateState, details);

  const nextQuestionKey = view.layout === "answer_grid"
    ? `answer_grid:${view.questionNumber || view.title || ""}`
    : view.layout;

  if (!currentStage) {
    content.innerHTML = "";
    content.appendChild(stage);
    currentStage = stage;
  } else if (nextQuestionKey !== activeQuestionKey && view.layout === "answer_grid") {
    const previousStage = currentStage;
    previousStage.classList.remove("is-entering");
    previousStage.classList.add("is-leaving");
    stage.classList.add("is-entering");
    content.appendChild(stage);
    currentStage = stage;
    window.setTimeout(() => {
      if (previousStage.isConnected) previousStage.remove();
    }, 220);
  } else {
    content.innerHTML = "";
    content.appendChild(stage);
    currentStage = stage;
  }
  activeQuestionKey = nextQuestionKey;

  if (view.layout === "answer_grid") {
    attachCountdown(details, view.questionEndsAt);
  } else {
    stopCountdownTimer();
  }

  if (view.latestResult) {
    showToast(buildTriviaToast(view.latestResult));
  }
}

socket.on("connect", () => {
  socket.emit("join_room", { code, name, clientId });
  document.getElementById("status").innerText = "Connected";
});

socket.on("player_identity", (identity) => {
  if (identity?.clientId) {
    clientId = identity.clientId;
    localStorage.setItem("clientId", identity.clientId);
  }

  if (identity?.name) {
    localStorage.setItem("name", identity.name);
    document.getElementById("playerChip").innerText = `Player: ${identity.name}`;
  }
});

socket.on("game_state", (state) => {
  latestState = state;

  if (state?.phase !== "game_select") {
    votedGameId = null;
  }

  render(latestState, latestPrivateState);
});

socket.on("private_state", (privateState) => {
  latestPrivateState = privateState || { gameId: null };
  render(latestState, latestPrivateState);
});

socket.on("error_message", (msg) => {
  alert(msg);
  if (msg === "That name is already taken") {
    localStorage.removeItem("name");
    window.location.href = `/name.html?code=${encodeURIComponent(code)}`;
    return;
  }

  window.location.href = "/";
});
</script>
</body>
</html>
